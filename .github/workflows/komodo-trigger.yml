name: Trigger Komodo Webhook on deploy.sh change

on:
  push:
    branches:
      - master
    paths:
      - 'scripts/deploy.sh'

jobs:
  trigger-komodo:
    runs-on: ubuntu-latest
    steps:
      - name: Call Komodo webhook
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
          REF: refs/heads/master
        run: |
          set -euo pipefail
          body=$(printf '{"ref":"%s"}' "$REF")
          signature="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"
          curl -k --fail-with-body --silent --show-error --retry 3 \
            -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature-256: $signature" \
            --data "$body"

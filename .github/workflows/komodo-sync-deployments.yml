name: Komodo - sync Docker deployments

on:
  push:
    branches: [master]
    paths: ['resources/deployments.toml']
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run Komodo Deployment Resource Sync
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_SYNC_DEPLOYMENTS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_SYNC_DEPLOYMENTS_WEBHOOK_SECRET }}
          REF: refs/heads/${{ github.ref_name }}
        run: |
          set -euo pipefail
          body=$(printf '{"ref":"%s"}' "$REF")
          signature="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"
          curl -k --fail-with-body --silent --show-error --retry 3 -X POST "$WEBHOOK_URL" -H 'Content-Type: application/json' -H "X-Hub-Signature-256: $signature" --data "$body"

name: Komodo GitOps Sync

on:
  push:
    branches: [master]
    paths:
      - 'servers/**'
      - 'stacks/**'
      - 'automation/**'
      - 'bootstrap/**'
      - 'scripts/**'
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths and trigger Komodo webhooks
        env:
          KOMODO_HOST: ${{ secrets.KOMODO_HOST }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          : "${KOMODO_HOST:?Missing GitHub secret KOMODO_HOST}"
          : "${WEBHOOK_SECRET:?Missing GitHub secret KOMODO_WEBHOOK_SECRET}"

          trigger_sync() {
            local sync_name="$1"
            local url="${KOMODO_HOST}/listener/github/sync/${sync_name}/sync"
            local body
            body=$(printf '{"ref":"refs/heads/%s"}' "$GITHUB_REF_NAME")
            local sig
            sig="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"
            echo "→ Sync: $sync_name"
            curl -k --fail-with-body --silent --show-error --retry 3 \
              -X POST "$url" \
              -H 'Content-Type: application/json' \
              -H "X-Hub-Signature-256: $sig" \
              --data "$body"
            echo ""
          }

          trigger_stack_deploy() {
            local stack_name="$1"
            local url="${KOMODO_HOST}/listener/github/stack/${stack_name}/deploy"
            local body
            body=$(printf '{"ref":"refs/heads/%s"}' "$GITHUB_REF_NAME")
            local sig
            sig="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"
            echo "→ Deploy stack: $stack_name"
            curl -k --fail-with-body --silent --show-error --retry 3 \
              -X POST "$url" \
              -H 'Content-Type: application/json' \
              -H "X-Hub-Signature-256: $sig" \
              --data "$body"
            echo ""
          }

          trigger_repo() {
            local repo_name="$1"
            local url="${KOMODO_HOST}/listener/github/repo/${repo_name}/pull"
            local body
            body=$(printf '{"ref":"refs/heads/%s"}' "$GITHUB_REF_NAME")
            local sig
            sig="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"
            echo "→ Repo pull: $repo_name"
            curl -k --fail-with-body --silent --show-error --retry 3 \
              -X POST "$url" \
              -H 'Content-Type: application/json' \
              -H "X-Hub-Signature-256: $sig" \
              --data "$body"
            echo ""
          }

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          # Bootstrap — creates/updates all other ResourceSyncs
          if echo "$CHANGED" | grep -q '^bootstrap/'; then
            trigger_sync "bootstrap"
            # After bootstrap sync, trigger all child syncs
            sleep 3
            trigger_sync "sync-server-resources"
            for dir in stacks/*/; do
              srv=$(basename "$dir")
              trigger_sync "sync-${srv}-stacks"
            done
            trigger_sync "sync-automation"
          fi

          # Deployments, repos (servers register via onboarding key)
          if echo "$CHANGED" | grep -q '^servers/'; then
            trigger_sync "sync-server-resources"
          fi

          # Stack definitions are applied through the matching ResourceSync.
          for dir in stacks/*/; do
            srv=$(basename "$dir")
            if echo "$CHANGED" | grep -q "^stacks/${srv}/stacks.toml$"; then
              trigger_sync "sync-${srv}-stacks"
            fi
          done

          # Compose files are not ResourceSync resources; deploy their Stack directly.
          if echo "$CHANGED" | grep -q '^stacks/periphery-181/nginx-demo/'; then
            trigger_stack_deploy "demo-nginx"
          fi

          # Automation (actions + procedures)
          if echo "$CHANGED" | grep -q '^automation/'; then
            trigger_sync "sync-automation"
          fi

          # Scripts → trigger Komodo Repo pull
          if echo "$CHANGED" | grep -q '^scripts/'; then
            trigger_repo "komodo-gitops-demo-script"
          fi

          echo "✅ Done."

name: Komodo - deploy Repo hook

on:
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - '.github/workflows/komodo-repo-deploy.yml'
  workflow_dispatch:

permissions: {}

jobs:
  pull-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Komodo Repo Pull
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_REPO_PULL_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_REPO_PULL_WEBHOOK_SECRET }}
          REF: refs/heads/${{ github.ref_name }}
        run: |
          set -euo pipefail
          body=$(printf '{"ref":"%s"}' "$REF")
          signature="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"
          curl -k --fail-with-body --silent --show-error --retry 3 \
            -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature-256: $signature" \
            --data "$body"

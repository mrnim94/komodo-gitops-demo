# Repo resources: clone source code và chạy arbitrary commands.
# Dùng cho automation, migration, script hooks.

[[repo]]
name = "komodo-gitops-demo-script"
description = "Run repository automation after clone or pull"
tags = ["gitops", "demo"]

[repo.config]
server = "komodo-periphery"
git_provider = "github.com"
repo = "mrnim94/komodo-gitops-demo"
branch = "master"

on_clone.path = "."
on_clone.command = """
bash scripts/deploy.sh
"""

on_pull.path = "."
on_pull.command = """
bash scripts/deploy.sh
"""

# Deployments: quản lý Docker container trực tiếp (không qua Compose).
# Mỗi [[deployment]] gắn với 1 server cụ thể.

[[deployment]]
name = "demo-nginx-container"
description = "Single Docker container managed directly by Komodo"
tags = ["demo", "gitops", "komodo-periphery"]
deploy = true

[deployment.config]
server = "periphery-181"
image.type = "Image"
image.params.image = "nginx:1.27-alpine"
network = "bridge"
restart = "unless-stopped"
ports = "8081:80"
labels = "app.kubernetes.io/managed-by=komodo\ndemo=gitops-direct-docker"

[[stack]]
name = "demo-nginx"
description = "Nginx deployed from GitHub with Komodo Resource Sync"
tags = ["demo", "gitops"]


deploy = true

[stack.config]
server = "komodo-periphery"
# Leave empty: Komodo Periphery clones this stack into its managed stack directory.
run_directory = ""

repo = "mrnim94/komodo-gitops-demo"
branch = "master"


git_provider = "github.com"
git_account = "mrnim94"

file_paths = ["nginx-demo/compose.yaml"]
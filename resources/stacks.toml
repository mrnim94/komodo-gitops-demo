# Use a Stack when the end result is a Docker Compose application.
# Komodo clones the repository, reads the compose file, and manages its lifecycle.
[[stack]]
name = "demo-nginx"
description = "Nginx Docker Compose application managed by Komodo"
tags = ["demo", "gitops"]
deploy = true

[stack.config]
server = "komodo-periphery"
repo = "mrnim94/komodo-gitops-demo"
branch = "master"
git_provider = "github.com"
file_paths = ["nginx-demo/compose.yaml"]

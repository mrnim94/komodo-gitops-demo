# Bootstrap: khai báo TẤT CẢ ResourceSync.
# managed = false → không track deletes, chỉ create/update

# --- Deployments & Repos (servers register via onboarding key, not GitOps) ---
[[resource_sync]]
name = "sync-server-resources"
[resource_sync.config]
repo = "mrnim94/komodo-gitops-demo"
branch = "master"
git_provider = "github.com"
resource_path = ["servers/deployments.toml", "servers/repos.toml"]
webhook_enabled = true
managed = false

# --- Per-server stacks ---
[[resource_sync]]
name = "sync-periphery-181-stacks"
[resource_sync.config]
repo = "mrnim94/komodo-gitops-demo"
branch = "master"
git_provider = "github.com"
resource_path = ["stacks/periphery-181/stacks.toml"]
webhook_enabled = true
managed = false

# --- Automation: Actions & Procedures ---
[[resource_sync]]
name = "sync-automation"
[resource_sync.config]
repo = "mrnim94/komodo-gitops-demo"
branch = "master"
git_provider = "github.com"
resource_path = ["automation/actions.toml", "automation/procedures.toml"]
webhook_enabled = true
managed = false
